run_name: cp_easy_frozen_protein_baseline
seed: 42
mode: train

data:
  dataset_name: SCOPE_CP
  split_name: cp_easy
  train_path: data/train.csv
  val_path: data/val.csv
  test_path: data/test.csv

model:
  drug_encoder: gcn
  protein_encoder: cnn
  protein_encoder_mode: frozen
  fusion: ban
  hidden_dim: 256
  dropout: 0.1

training:
  epochs: 30
  batch_size: 128
  lr: 1.0e-4
  weight_decay: 1.0e-5
  amp: true
  num_workers: 4
  early_stopping_patience: 7
  device: cuda

output:
  root_dir: results
  save_checkpoints: true
  save_every_n_epochs: 5

metrics:
  primary: auprc
  extra:
    - auroc
    - precision
    - recall
    - f1
    - accuracy
